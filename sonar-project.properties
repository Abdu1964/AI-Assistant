# Project identification
sonar.projectKey=ai-assistant
sonar.projectName=AI Assistant
sonar.projectVersion=1.0

# Source code
sonar.sources=app
sonar.tests=tests
sonar.python.version=3.10

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions
sonar.exclusions=**/migrations/**,**/venv/**,**/__pycache__/**,**/*.pyc,**/tests/**

# Test exclusions
sonar.test.exclusions=**/tests/**

# Pylint
sonar.python.pylint.reportPaths=pylint-report.json

# Duplication exclusions (if needed)
sonar.cpd.exclusions=**/migrations/**

# Quality Gate settings (optional)
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300