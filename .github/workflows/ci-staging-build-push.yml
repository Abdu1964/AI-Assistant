name: CI - Build, Validate and Push AI-Assistant (Staging Only)

on:
  push:
    branches: [ staging ]
  pull_request:
    types: [opened, synchronize, reopened, closed]   
    branches: [staging]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}

jobs:
  # SonarQube Code Quality Analysis
  code-quality-analysis:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install . pytest pytest-cov pylint PyJWT
    
    - name: Run tests with coverage
      env:
        # Port Configuration - hardcoded for tests
        FLASK_HOST_PORT: 5000
        FLASK_INTERNAL_PORT: 5000
        REDIS_HOST_PORT: 6379
        REDIS_INTERNAL_PORT: 6379
        MONGODB_HOST_PORT: 27017
        MONGODB_INTERNAL_PORT: 27017
        QDRANT_HOST_PORT: 6333
        QDRANT_INTERNAL_PORT: 6333
        QDRANT_GRPC_HOST_PORT: 6334
        QDRANT_GRPC_INTERNAL_PORT: 6334
        
        # LLM Configuration - hardcoded for tests
        BASIC_LLM_PROVIDER: gemini
        BASIC_LLM_VERSION: gemini-1.5-flash
        ADVANCED_LLM_PROVIDER: gemini
        ADVANCED_LLM_VERSION: gemini-1.5-pro
        
        # API Keys - dummy values for tests
        GEMINI_API_KEY: dummy-gemini-key-for-ci-tests
        OPENAI_API_KEY: dummy-openai-key-for-ci-tests
        JWT_SECRET: test-jwt-secret-for-ci-only
        
        # Application Configuration - hardcoded for tests
        MODEL_PATH: ./models
        VECTOR_COLLECTION: test
        
        # Database Configuration - dummy values for tests
        MONGO_USERNAME: test
        MONGO_PASSWORD: test
        MONGO_DATABASE: test
        MONGO_URL: mongodb://test:test@localhost:27017/test?authSource=admin
        
        # Redis Configuration - localhost for tests
        REDIS_HOST: localhost
        REDIS_URL: redis://localhost:6379/0
        
        # Qdrant Configuration - localhost for tests
        QDRANT_CLIENT: http://localhost:6333
      run: |
        pytest --cov=app --cov-report=xml --cov-report=html tests/ || true
    
    - name: Run pylint
      run: |
        pylint app/ --output-format=json > pylint-report.json || true
    
    - name: SonarQube Scan
      uses: sonarsource/sonarqube-scan-action@master
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: http://${{ secrets.HETZNER_IP }}:9000
      with:
        args: >
          -Dsonar.projectKey=AI-Assistant
          -Dsonar.sources=app
          -Dsonar.tests=tests
          -Dsonar.python.coverage.reportPaths=coverage.xml
          -Dsonar.python.pylint.reportPaths=pylint-report.json
          -Dsonar.exclusions=**/migrations/**,**/venv/**,**/__pycache__/**
    
    - name: SonarQube Quality Gate Check
      uses: sonarsource/sonarqube-quality-gate-action@master
      timeout-minutes: 5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      continue-on-error: true
    
    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-reports
        path: |
          coverage.xml
          htmlcov/
          pylint-report.json

  # Unit Tests
  unit-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install . pytest pytest-cov PyJWT
    
    - name: Run unit tests
      env:
        # Port Configuration - hardcoded for tests
        FLASK_HOST_PORT: 5000
        FLASK_INTERNAL_PORT: 5000
        REDIS_HOST_PORT: 6379
        REDIS_INTERNAL_PORT: 6379
        MONGODB_HOST_PORT: 27017
        MONGODB_INTERNAL_PORT: 27017
        QDRANT_HOST_PORT: 6333
        QDRANT_INTERNAL_PORT: 6333
        QDRANT_GRPC_HOST_PORT: 6334
        QDRANT_GRPC_INTERNAL_PORT: 6334
        
        # LLM Configuration - hardcoded for tests
        BASIC_LLM_PROVIDER: gemini
        BASIC_LLM_VERSION: gemini-1.5-flash
        ADVANCED_LLM_PROVIDER: gemini
        ADVANCED_LLM_VERSION: gemini-1.5-pro
        
        # API Keys - dummy values for tests
        GEMINI_API_KEY: dummy-gemini-key-for-ci-tests
        OPENAI_API_KEY: dummy-openai-key-for-ci-tests
        JWT_SECRET: test-jwt-secret-for-ci-only
        
        # Application Configuration - hardcoded for tests
        MODEL_PATH: ./models
        VECTOR_COLLECTION: test
        
        # Database Configuration - dummy values for tests
        MONGO_USERNAME: test
        MONGO_PASSWORD: test
        MONGO_DATABASE: test
        MONGO_URL: mongodb://test:test@localhost:27017/test?authSource=admin
        
        # Redis Configuration - localhost for tests
        REDIS_HOST: localhost
        REDIS_URL: redis://localhost:6379/0
        
        # Qdrant Configuration - localhost for tests
        QDRANT_CLIENT: http://localhost:6333
      run: |
        pytest tests/ --cov=app --cov-report=xml --cov-report=term-missing
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: coverage.xml

  build-and-validate-assistant:
    needs: [code-quality-analysis, unit-tests]
    if: |
      (github.event_name == 'pull_request') || 
      (github.event_name == 'push')
    runs-on: ubuntu-latest

    outputs:
      validation-status: ${{ steps.validate-container.outcome }}
      image-tag: ${{ steps.set-image-tag.outputs.image-tag }}
      docker-pushed: ${{ steps.deployment-trigger.outputs.docker_pushed }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 2
    
    # Secret Scanning with TruffleHog
    - name: TruffleHog Secret Scan
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD
        extra_args: --debug --only-verified

    - name: Free up disk space
      run: |
        echo "=== Disk space before cleanup ==="
        df -h
        
        echo "=== Removing unnecessary packages ==="
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        
        echo "=== Cleaning Docker ==="
        docker system prune -af --volumes
        
        echo "=== Disk space after cleanup ==="
        df -h
     
    - name: Check if this is a merge commit (for push events)
      id: check-merge
      run: |
        if [ "${{ github.event_name }}" == "push" ]; then
          if [ $(git rev-list --parents -n 1 HEAD | wc -w) -gt 2 ]; then
            echo "is_merge=true" >> $GITHUB_OUTPUT
            echo "This is a merge commit from a PR"
          else
            echo "is_merge=false" >> $GITHUB_OUTPUT
            echo "This is a direct push, not a merge"
          fi
        else
          echo "is_merge=false" >> $GITHUB_OUTPUT
        fi
     
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
     
    - name: Login to Docker Hub
      if: github.event_name == 'push' && steps.check-merge.outputs.is_merge == 'true'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Create .env file
      run: |
        echo "=== Creating .env file from GitHub Secrets ==="
        
        echo "FLASK_HOST_PORT=${{ secrets.FLASK_HOST_PORT }}" >> .env
        echo "FLASK_INTERNAL_PORT=${{ secrets.FLASK_INTERNAL_PORT }}" >> .env
        echo "REDIS_HOST_PORT=${{ secrets.REDIS_HOST_PORT }}" >> .env
        echo "REDIS_INTERNAL_PORT=${{ secrets.REDIS_INTERNAL_PORT }}" >> .env
        echo "MONGODB_HOST_PORT=${{ secrets.MONGODB_HOST_PORT }}" >> .env
        echo "MONGODB_INTERNAL_PORT=${{ secrets.MONGODB_INTERNAL_PORT }}" >> .env
        echo "QDRANT_HOST_PORT=${{ secrets.QDRANT_HOST_PORT }}" >> .env
        echo "QDRANT_INTERNAL_PORT=${{ secrets.QDRANT_INTERNAL_PORT }}" >> .env
        echo "QDRANT_GRPC_HOST_PORT=${{ secrets.QDRANT_GRPC_HOST_PORT }}" >> .env
        echo "QDRANT_GRPC_INTERNAL_PORT=${{ secrets.QDRANT_GRPC_INTERNAL_PORT }}" >> .env
        
        echo "BASIC_LLM_PROVIDER=${{ secrets.BASIC_LLM_PROVIDER || 'gemini' }}" >> .env
        echo "BASIC_LLM_VERSION=${{ secrets.BASIC_LLM_VERSION || 'gemini-1.5-flash' }}" >> .env
        echo "ADVANCED_LLM_PROVIDER=${{ secrets.ADVANCED_LLM_PROVIDER || 'gemini' }}" >> .env
        echo "ADVANCED_LLM_VERSION=${{ secrets.ADVANCED_LLM_VERSION || 'gemini-1.5-pro' }}" >> .env
        echo "GEMINI_API_KEY=dummy-gemini-key-for-ci" >> .env
        echo "OPENAI_API_KEY=dummy-openai-key-for-ci" >> .env
        echo "JWT_SECRET=${{ secrets.JWT_SECRET || 'dummy-jwt-secret-for-ci' }}" >> .env
        echo "MODEL_PATH=${{ secrets.MODEL_PATH || './models' }}" >> .env
        echo "VECTOR_COLLECTION=${{ secrets.VECTOR_COLLECTION || 'test' }}" >> .env
        
        echo "MONGO_USERNAME=${{ secrets.MONGO_USERNAME || 'test' }}" >> .env
        echo "MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD || 'test' }}" >> .env
        echo "MONGO_DATABASE=${{ secrets.MONGO_DATABASE || 'test' }}" >> .env
        
        echo "=== .env file created successfully ==="
        cat .env
        
    - name: Create docker-compose for CI
      run: |
        echo "=== Creating docker-compose.ci.yml ==="
        cat > docker-compose.ci.yml << 'EOF'
        services:
          assistant:
            build:
              context: .
              dockerfile: Dockerfile
            volumes:
              - .:/AI-Assistant:rw
              - logfiles:/AI-Assistant/logfiles
              - static:/static
            ports:
              - "${FLASK_HOST_PORT}:${FLASK_INTERNAL_PORT}"
            command: >
              sh -c "
              gunicorn -w 4 --bind 0.0.0.0:${FLASK_INTERNAL_PORT} --timeout 180 --log-level debug run:app
              "
            restart: always
            depends_on:
              - qdrant
              - redis
              - mongodb
            environment:
              BASIC_LLM_PROVIDER: ${BASIC_LLM_PROVIDER}
              BASIC_LLM_VERSION: ${BASIC_LLM_VERSION}
              ADVANCED_LLM_PROVIDER: ${ADVANCED_LLM_PROVIDER}
              ADVANCED_LLM_VERSION: ${ADVANCED_LLM_VERSION}
              GEMINI_API_KEY: ${GEMINI_API_KEY}
              OPENAI_API_KEY: ${OPENAI_API_KEY}
              FLASK_INTERNAL_PORT: ${FLASK_INTERNAL_PORT}
              FLASK_HOST_PORT: ${FLASK_HOST_PORT}
              JWT_SECRET: ${JWT_SECRET}
              MODEL_PATH: ${MODEL_PATH}
              REDIS_HOST: redis
              REDIS_INTERNAL_PORT: ${REDIS_INTERNAL_PORT}
              REDIS_URL: redis://redis:${REDIS_INTERNAL_PORT}/0
              MONGODB_HOST: mongodb
              MONGODB_INTERNAL_PORT: ${MONGODB_INTERNAL_PORT}
              MONGO_USERNAME: ${MONGO_USERNAME}
              MONGO_PASSWORD: ${MONGO_PASSWORD}
              MONGO_DATABASE: ${MONGO_DATABASE}
              MONGO_URL: "mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongodb:${MONGODB_INTERNAL_PORT}/${MONGO_DATABASE}?authSource=admin"
              QDRANT_CLIENT: http://qdrant:${QDRANT_INTERNAL_PORT}
              VECTOR_COLLECTION: ${VECTOR_COLLECTION}
          qdrant:
            image: qdrant/qdrant:latest
            ports: 
              - "${QDRANT_HOST_PORT}:${QDRANT_INTERNAL_PORT}"
              - "${QDRANT_GRPC_HOST_PORT}:${QDRANT_GRPC_INTERNAL_PORT}"
            volumes:
              - vectordata:/qdrant/storage
          redis:
            image: redis:6-alpine
            restart: always
            ports:
              - "${REDIS_HOST_PORT}:${REDIS_INTERNAL_PORT}"
          mongodb:
            image: mongo:6.0
            restart: always
            ports:
              - "${MONGODB_HOST_PORT}:${MONGODB_INTERNAL_PORT}"
            environment:
              MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
              MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
              MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
            volumes:
              - mongodb_data:/data/db
        volumes:
          vectordata:
          static:
          mongodb_data:
          logfiles:
        EOF
        echo "=== docker-compose.ci.yml created successfully ==="
        
    - name: Build and Validate Assistant Container
      id: validate-container
      run: |
        echo "=== Building and Validating AI Assistant Service ==="
        echo "Event: ${{ github.event_name }}"
        echo "Action: ${{ github.event.action }}"
        
        echo "=== Building Docker images ==="
        docker compose -f docker-compose.ci.yml build
        
        echo "=== Starting all services with 'docker compose up' ==="
        docker compose -f docker-compose.ci.yml up -d
        
        echo "=== Waiting 90 seconds for services to initialize ==="
        sleep 90
        
        echo "=== Checking 'docker ps -a' for all containers ==="
        docker ps -a --filter "name=ai-assistant" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
        
        echo ""
        echo "=== Checking Assistant Container Logs ==="
        CONTAINER_NAME="ai-assistant-assistant-1"
        
        if docker ps -a --filter "name=$CONTAINER_NAME" | grep -q "$CONTAINER_NAME"; then
          echo "[SUCCESS] Container $CONTAINER_NAME exists"
          
          CONTAINER_STATUS=$(docker inspect --format='{{.State.Status}}' $CONTAINER_NAME 2>/dev/null || echo "unknown")
          echo "Container status: $CONTAINER_STATUS"
          
          if [[ "$CONTAINER_STATUS" == "exited" ]]; then
            EXIT_CODE=$(docker inspect --format='{{.State.ExitCode}}' $CONTAINER_NAME)
            echo "Exit code: $EXIT_CODE"
          fi
          
          echo ""
          echo "=== Container Logs ==="
          docker logs $CONTAINER_NAME --tail 700 || echo "Could not get logs"
          
          if [[ "$CONTAINER_STATUS" == "exited" ]]; then
            echo ""
            echo "=== RESTARTING CONTAINER ==="
            docker restart $CONTAINER_NAME
            sleep 5
            echo "=== LOGS AFTER RESTART ==="
            docker logs $CONTAINER_NAME --tail 50 || echo "Could not get logs after restart"
          fi
        else
          echo "[ERROR] Container $CONTAINER_NAME does not exist"
          exit 1
        fi
        
        echo ""
        echo "=== DOCKER COMPOSE STATUS ==="
        docker compose -f docker-compose.ci.yml ps
        
        echo ""
        echo "=== Testing MongoDB Connection ==="
        if [ "${{ github.event_name }}" == "push" ]; then
          docker compose -f docker-compose.ci.yml exec -T mongodb mongosh -u ${{ secrets.MONGO_USERNAME }} -p ${{ secrets.MONGO_PASSWORD }} --authenticationDatabase admin --eval "db.runCommand({ping: 1})" ${{ secrets.MONGO_DATABASE }} || echo "MongoDB connection test failed"
        else
          echo "Skipping MongoDB auth test for PR validation (using dummy credentials)"
        fi
        
        echo ""
        echo "=== Final Validation Result ==="
        
        INFRA_RUNNING=true
        for service in qdrant redis mongodb assistant; do
          if docker compose -f docker-compose.ci.yml ps $service | grep -q "Up"; then
            echo "[SUCCESS] $service is running"
          else
            echo "[ERROR] $service is NOT running"
            INFRA_RUNNING=false
          fi
        done
        
        APP_HEALTHY=true
        echo "=== Testing application health endpoint ==="
        FLASK_HOST_PORT=${{ secrets.FLASK_HOST_PORT || '5000' }}
        echo "Testing health on port: ${FLASK_HOST_PORT}"
        echo "=== Debug: Container port mapping ==="
        docker port ai-assistant-assistant-1
        echo "=== Debug: Testing connectivity ==="
        curl -v http://localhost:${FLASK_HOST_PORT}/ 2>&1 | head -20 || echo "Curl failed with detailed output above"
        if curl -f http://localhost:${FLASK_HOST_PORT}/health 2>/dev/null || \
          curl -f http://localhost:${FLASK_HOST_PORT}/ 2>/dev/null; then
          echo "[SUCCESS] Application is responding"
        else
          echo "[ERROR] Application is NOT responding"
          APP_HEALTHY=false
        fi
        
        if [[ "$INFRA_RUNNING" == "true" && "$APP_HEALTHY" == "true" ]]; then
          echo ""
          echo "✅ [SUCCESS] All validations passed!"
        else
          echo ""
          echo "❌ [FAILED] Validation failed"
          exit 1
        fi

    # Trivy Vulnerability Scanner - BEFORE pushing
    - name: Run Trivy vulnerability scanner
      if: steps.validate-container.outcome == 'success'
      run: |
        echo "=== Scanning image for vulnerabilities ==="
        
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install trivy -y
        
        IMAGE_ID=$(docker compose -f docker-compose.ci.yml images -q assistant)
        
        trivy image --severity HIGH,CRITICAL --exit-code 1 $IMAGE_ID
        
        echo "[SUCCESS] No critical vulnerabilities found"
    
    - name: Generate Trivy report
      if: always() && steps.validate-container.outcome == 'success'
      run: |
        IMAGE_ID=$(docker compose -f docker-compose.ci.yml images -q assistant)
        trivy image --format sarif --output trivy-results.sarif $IMAGE_ID
    
    - name: Upload Trivy results to GitHub Security
      if: always() && steps.validate-container.outcome == 'success'
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

    # Load Testing
    - name: Run basic load test
      if: steps.validate-container.outcome == 'success'
      run: |
        echo "=== Running basic load test ==="
        pip install locust
        
        cat > /tmp/locustfile.py << 'EOF'
        from locust import HttpUser, task, between
        
        class QuickLoadTest(HttpUser):
            wait_time = between(1, 2)
            
            @task
            def health_check(self):
                self.client.get("/health")
            
            @task(3)
            def root_endpoint(self):
                self.client.get("/")
        EOF
        
        FLASK_HOST_PORT=${{ secrets.FLASK_HOST_PORT || '5000' }}
        locust -f /tmp/locustfile.py --headless \
          -u 10 -r 2 --run-time 30s \
          --host http://localhost:${FLASK_HOST_PORT} \
          --html /tmp/locust-report.html || echo "Load test completed with warnings"
        
        echo "Load test completed - check artifacts for detailed report"
    
    - name: Upload load test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: load-test-report
        path: /tmp/locust-report.html

    # Docker Image Size Check
    - name: Check Docker image size
      if: steps.validate-container.outcome == 'success'
      run: |
        echo "=== Checking Docker image size ==="
        IMAGE_ID=$(docker compose -f docker-compose.ci.yml images -q assistant)
        SIZE=$(docker images $IMAGE_ID --format "{{.Size}}")
        echo "Image size: $SIZE"
        
        SIZE_BYTES=$(docker images $IMAGE_ID --format "{{.Size}}" | numfmt --from=iec)
        MAX_SIZE=$((2 * 1024 * 1024 * 1024))
        
        if [ $SIZE_BYTES -gt $MAX_SIZE ]; then
          echo "⚠️ WARNING: Image size ($SIZE) exceeds recommended maximum (2GB)"
        else
          echo "✅ Image size is within acceptable limits"
        fi
    
    # Smoke Tests
    - name: Run smoke tests
      if: steps.validate-container.outcome == 'success'
      run: |
        echo "=== Running smoke tests on critical endpoints ==="
        FLASK_HOST_PORT=${{ secrets.FLASK_HOST_PORT || '5000' }}
        
        ENDPOINTS=("/health" "/" "/api/status")
        
        for endpoint in "${ENDPOINTS[@]}"; do
          echo "Testing endpoint: $endpoint"
          if curl -f -s -o /dev/null -w "%{http_code}" http://localhost:${FLASK_HOST_PORT}${endpoint} | grep -q "200\|404"; then
            echo "✅ $endpoint - OK"
          else
            echo "❌ $endpoint - FAILED"
            exit 1
          fi
        done
        
        echo "[SUCCESS] All smoke tests passed!"
    
    # Tag and Push - only after all checks pass
    - name: Tag and Push Image to Docker Hub
      if: github.event_name == 'push' && steps.check-merge.outputs.is_merge == 'true' && steps.validate-container.outcome == 'success'
      run: |
        echo "=== Tagging and pushing Assistant image to Docker Hub ==="
        
        IMAGE_ID=$(docker compose -f docker-compose.ci.yml images -q assistant)
        SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
        
        STAGING_TAG="${{ secrets.DOCKER_HUB_USERNAME }}/ai-assistant:staging"
        SHA_TAG="${{ secrets.DOCKER_HUB_USERNAME }}/ai-assistant:staging-${SHORT_SHA}"
        LATEST_TAG="${{ secrets.DOCKER_HUB_USERNAME }}/ai-assistant:staging-latest"
        
        docker tag $IMAGE_ID $STAGING_TAG
        docker tag $IMAGE_ID $SHA_TAG
        docker tag $IMAGE_ID $LATEST_TAG
        
        docker push $STAGING_TAG
        docker push $SHA_TAG
        docker push $LATEST_TAG
        
        echo "[SUCCESS] Images pushed successfully to Docker Hub"
        echo "Tags:"
        echo "  - $STAGING_TAG"
        echo "  - $SHA_TAG (for rollback)"
        echo "  - $LATEST_TAG"

    # Image Signing with Cosign
    - name: Install Cosign
      if: github.event_name == 'push' && steps.check-merge.outputs.is_merge == 'true' && steps.validate-container.outcome == 'success'
      uses: sigstore/cosign-installer@v3
    
    - name: Sign Docker image
      if: github.event_name == 'push' && steps.check-merge.outputs.is_merge == 'true' && steps.validate-container.outcome == 'success'
      env:
        COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
      run: |
        echo "=== Signing Docker image ==="
        IMAGE_TAG="${{ secrets.DOCKER_HUB_USERNAME }}/ai-assistant:staging"
        echo "$COSIGN_PRIVATE_KEY" > /tmp/cosign.key
        cosign sign --key /tmp/cosign.key $IMAGE_TAG -y
        rm /tmp/cosign.key
        echo "[SUCCESS] Image signed successfully"

    - name: Set deployment trigger
      if: github.event_name == 'push' && steps.check-merge.outputs.is_merge == 'true' && steps.validate-container.outcome == 'success'
      id: deployment-trigger
      run: |
        echo "docker_pushed=true" >> $GITHUB_OUTPUT
        
    - name: Cleanup Docker Compose
      if: always()
      run: |
        echo "=== Cleaning up Docker Compose setup ==="
        docker compose -f docker-compose.ci.yml down -v
        rm -f docker-compose.ci.yml
        rm -f .env
        
    - name: Cleanup Docker system
      if: always()
      run: |
        echo "=== Cleaning up Docker system ==="
        docker system prune -f
        echo "=== Disk space after cleanup ==="
        df -h
        
    - name: Trigger CD workflow via Repository Dispatch
      if: github.event_name == 'push' && steps.check-merge.outputs.is_merge == 'true' && steps.validate-container.outcome == 'success'
      run: |
        curl -L -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/${{ github.repository }}/dispatches \
          -d '{"event_type":"deploy-staging","client_payload":{"image_tag":"${{ secrets.DOCKER_HUB_USERNAME }}/ai-assistant:staging"}}'
        echo "[SUCCESS] CD workflow triggered successfully!"

  # Slack Notifications
  notify-success:
    runs-on: ubuntu-latest
    needs: [build-and-validate-assistant]
    if: success() && github.event_name == 'push'
    steps:
    - name: Send Slack notification
      uses: slackapi/slack-github-action@v1.25.0
      with:
        payload: |
          {
            "text": "✅ CI Pipeline SUCCESS for AI-Assistant",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*CI Pipeline Completed Successfully* ✅\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}"
                }
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  notify-failure:
    runs-on: ubuntu-latest
    needs: [build-and-validate-assistant]
    if: failure()
    steps:
    - name: Send Slack notification
      uses: slackapi/slack-github-action@v1.25.0
      with:
        payload: |
          {
            "text": "❌ CI Pipeline FAILED for AI-Assistant",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*CI Pipeline Failed* ❌\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}\n*Workflow Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                }
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        
  validation-summary:
    runs-on: ubuntu-latest
    needs: build-and-validate-assistant
    if: always()
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Display artifact structure
      run: |
        echo "=== Downloaded Artifacts ==="
        ls -R artifacts/ || echo "No artifacts found"
        
    - name: Summary
      run: |
        echo "=== CI/CD Validation Summary ==="
        echo "Event: ${{ github.event_name }}"
        echo "Assistant Validation: ${{ needs.build-and-validate-assistant.outputs.validation-status }}"
        
        if [[ "${{ needs.build-and-validate-assistant.outputs.validation-status }}" == "success" ]]; then
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "[SUCCESS] AI Assistant built, validated, and pushed to Docker Hub!"
            echo "*** Image: ${{ secrets.DOCKER_HUB_USERNAME }}/ai-assistant:staging"
          else
            echo "[SUCCESS] PR validation passed - ready to merge!"
          fi
        else
          echo "[ERROR] Validation did not pass. Check the build-and-validate-assistant job for details."
          exit 1
        fi