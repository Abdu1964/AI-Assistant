name: Deploy AI Assistant to Production

on:
  push:
    branches:
      - update_agents # specific branch

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      # Secrets
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # Variables
      ADVANCED_LLM_PROVIDER: ${{ vars.ADVANCED_LLM_PROVIDER }}
      ADVANCED_LLM_VERSION: ${{ vars.ADVANCED_LLM_VERSION }}
      BASIC_LLM_PROVIDER: ${{ vars.BASIC_LLM_PROVIDER }}
      BASIC_LLM_VERSION: ${{ vars.BASIC_LLM_VERSION }}
      FLASK_PORT: ${{ vars.FLASK_PORT }}

      # Mock/Test configuration (add these if not in secrets)
      REDIS_URL: ${{ vars.REDIS_URL }}
      REDIS_HOST:  ${{ vars.REDIS_HOST }}
      REDIS_PORT: ${{ vars.REDIS_PORT }}
      QDRANT_CLIENT: ${{ vars.QDRANT_CLIENT }}
      MONGO_USERNAME: ${{ vars.MONGO_USERNAME }}
      MONGO_PASSWORD: ${{ vars.MONGO_PASSWORD }}
      MONGO_DATABASE: ${{ vars.MONGO_DATABASE }}
      MONGO_URL: ${{ vars.MONGO_URL }}

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379

      mongo:
        image: mongo:6
        ports:
          - 27017:27017

      qdrant:
        image: qdrant/qdrant:v1.8.2
        ports:
          - 6333:6333

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        id: cache
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install dependencies
        run: |
          poetry install --no-interaction


      - name: Create required directories
        run: mkdir -p logfiles

      - name: Debug environment variables
        run: |
          echo "JWT_SECRET set: $([[ -n "$JWT_SECRET" ]] && echo YES || echo NO)"
          echo "GEMINI_API_KEY set: $([[ -n "$GEMINI_API_KEY" ]] && echo YES || echo NO)"
          echo "FLASK_PORT: $FLASK_PORT"

      - name: Run tests
        run: |
          poetry run pytest -v --disable-warnings
