# BioCypher config for Drosophila melanogaster (fly) knowledge graph

biocypher:
  offline: true
  debug: false
  schema_config_path: app/annotation_graph/schema/fly/dmel_full_schema_config.yaml

neo4j:
  delimiter: '\t'
  array_delimiter: '|'
  skip_duplicate_nodes: true
  skip_bad_relationships: true
